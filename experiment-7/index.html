<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Events Demo</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1 id="heading">
            Welcome to JavaScript Lab
        </h1>

        <input
            type="text"
            id="inputText"
            placeholder="Enter new heading text">

        <br><br>

        <button id="changeHeading">
            Change Heading
        </button>

        <button id="changeBackground">
            Change Background
        </button>

        <button id="increaseFont">
            Increase Font Size
        </button>

        <br><br>

        <button id="toggleParagraph">
            Show/Hide Paragraph
        </button>

        <button id="reset">
            Reset
        </button>

        <p id="para">
            This is a sample paragraph. JavaScript events can dynamically change content.
        </p>

    </div>

    <script src="script.js"></script>

</body>

</html>
