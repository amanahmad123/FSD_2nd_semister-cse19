<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechStore</title>

    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f5f5f5;
        }

        .navbar{
            background:#1d2228;
        }

        .navbar-brand,
        .nav-link{
            color:white !important;
        }

        .card{
            transition:0.3s;
        }

        .card:hover{
            transform:scale(1.03);
            box-shadow:0px 0px 10px gray;
        }

        .card img{
            height:200px;
            object-fit:contain;
            padding:10px;
        }

        footer{
            background:#1d2228;
            color:white;
            text-align:center;
            padding:15px;
            margin-top:30px;
        }
    </style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg">
    <div class="container">

        <a class="navbar-brand" href="#">TechStore</a>

        <button class="navbar-toggler bg-light"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#menu">

        <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse justify-content-end" id="menu">

            <ul class="navbar-nav">

                <li class="nav-item">
                    <a class="nav-link" href="#">Home</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#">Products</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#">About</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#">Contact</a>
                </li>

            </ul>

        </div>

    </div>
</nav>

<!-- Product Section -->

<div class="container mt-5">

<div class="row g-4">

<!-- Card 1 -->

<div class="col-sm-12 col-md-6 col-lg-4">

<div class="card">

<img src="https://images.unsplash.com/photo-1496181133206-80ce9b88a853?w=500"
class="card-img-top">

<div class="card-body">

<h4>Laptop</h4>

<p>High performance laptop</p>

<h5>₹50,000
<span class="badge bg-success">New</span>
</h5>

<button class="btn btn-primary"
data-bs-toggle="modal"
data-bs-target="#productModal"
onclick="showDetails('Laptop','High performance laptop with Intel i7 Processor, 16GB RAM and 512GB SSD.')">

View Details

</button>

</div>

</div>

</div>

<!-- Card 2 -->

<div class="col-sm-12 col-md-6 col-lg-4">

<div class="card">

<img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=500"
class="card-img-top">

<div class="card-body">

<h4>Mobile</h4>

<p>Latest smartphone</p>

<h5>₹30,000
<span class="badge bg-danger">Sale</span>
</h5>

<button class="btn btn-primary"
data-bs-toggle="modal"
data-bs-target="#productModal"
onclick="showDetails('Mobile','Latest smartphone with AMOLED display, 5G support and 128GB storage.')">

View Details

</button>

</div>

</div>

</div>

<!-- Card 3 -->

<div class="col-sm-12 col-md-6 col-lg-4">

<div class="card">

<img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=500"
class="card-img-top">

<div class="card-body">

<h4>Headphones</h4>

<p>Noise cancelling</p>

<h5>₹5,000
<span class="badge bg-success">New</span>
</h5>

<button class="btn btn-primary"
data-bs-toggle="modal"
data-bs-target="#productModal"
onclick="showDetails('Headphones','Wireless noise cancelling headphones with 40-hour battery backup.')">

View Details

</button>

</div>

</div>

</div>

</div>

</div>

<!-- Modal -->

<div class="modal fade" id="productModal">

<div class="modal-dialog">

<div class="modal-content">

<div class="modal-header">

<h4 class="modal-title" id="modalTitle">
Product
</h4>

<button class="btn-close"
data-bs-dismiss="modal">
</button>

</div>

<div class="modal-body" id="modalBody">

Details

</div>

<div class="modal-footer">

<button class="btn btn-secondary"
data-bs-dismiss="modal">

Close

</button>

</div>

</div>

</div>

</div>

<!-- Footer -->

<footer>

© 2026 TechStore | Follow us on social media

</footer>

<!-- Bootstrap JS -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

function showDetails(name,details)
{
document.getElementById("modalTitle").innerHTML=name;
document.getElementById("modalBody").innerHTML=details;
}

</script>

</body>
</html>
