<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Even or Odd Checker</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg, #667eea, #764ba2);
        }

        .container{
            background:white;
            padding:40px;
            width:350px;
            border-radius:15px;
            text-align:center;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
        }

        h1{
            color:#333;
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:12px;
            border:2px solid #ddd;
            border-radius:8px;
            font-size:16px;
            margin-bottom:15px;
            outline:none;
        }

        input:focus{
            border-color:#667eea;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#667eea;
            color:white;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#4f5bd5;
        }

        #result{
            margin-top:20px;
            font-size:22px;
            font-weight:bold;
            color:#764ba2;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Even or Odd Checker</h1>

        <input type="number" id="num" placeholder="Enter a Number">

        <button onclick="checkNumber()">
            Check Number
        </button>

        <p id="result"></p>
    </div>

    <script>
        function checkNumber()
        {
            let number = document.getElementById("num").value;

            if(number % 2 == 0)
            {
                document.getElementById("result").innerHTML =
                number + " is an Even Number";
            }
            else
            {
                document.getElementById("result").innerHTML =
                number + " is an Odd Number";
            }
        }
    </script>

</body>
</html>
